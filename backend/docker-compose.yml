services:
  mysql:
    image: mysql:8.4
    container_name: greenwood-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: greenwood
      MYSQL_DATABASE: greenwood
    ports:
      - "3307:3306"
    volumes:
      - greenwood_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pgreenwood"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  greenwood_mysql_data:
