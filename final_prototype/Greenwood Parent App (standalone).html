  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body{margin:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#15211b;-webkit-font-smoothing:antialiased}\n  a{color:#15412f}a:hover{color:#1d5740}\n  .gw-scroll::-webkit-scrollbar{width:0;height:0;display:none}\n  .gw-scroll{scrollbar-width:none}\n  input,textarea,select{outline:none}\n  input:focus,textarea:focus{border-color:#15412f!important}\n  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}\n  @keyframes gwpulse{0%,100%{opacity:1}50%{opacity:.3}}\n  @keyframes gwfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n  @keyframes gwslideup{from{opacity:0;transform:translateY(20px)}}\n  @keyframes gwsheet{from{transform:translateY(100%)}to{transform:translateY(0)}}\n  @media(prefers-reduced-motion:reduce){*{animation:none!important}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:radial-gradient(120% 80% at 15% 0%, #f3f6f1 0%, #e7ebe4 55%, #dde4d9 100%);padding:40px 18px 64px\">\n<div style=\"max-width:1000px;margin:0 auto;display:flex;gap:48px;align-items:flex-start;justify-content:center;flex-wrap:wrap\">\n\n  <!-- INTRO -->\n  <div style=\"flex:1;min-width:260px;max-width:340px;padding-top:30px\">\n    <div style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#15412f;font-weight:600;display:flex;align-items:center;gap:10px\">\n      <span style=\"width:26px;height:1px;background:#c2a04e;display:inline-block\"><\u002Fspan>Clickable Prototype\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:clamp(30px,4.5vw,44px);line-height:1.03;letter-spacing:-.01em;margin:14px 0 12px\">One app, three points of view.<\u002Fh1>\n    <p style=\"color:#6c766f;font-size:14.5px;line-height:1.6;margin:0 0 18px\">The same Greenwood app, seen as a parent, a teacher, or the school admin. Switch the role, tap the phone, and explore.<\u002Fp>\n\n    <div style=\"font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#6c766f;font-weight:600;margin-bottom:8px\">View as<\u002Fdiv>\n    <div style=\"display:flex;gap:6px;background:#fff;border:1px solid #e6e9e3;border-radius:15px;padding:5px;margin-bottom:20px\">\n      <sc-for list=\"{{ roleTabs }}\" as=\"r\" hint-placeholder-count=\"3\"><button onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\">{{ r.label }}<\u002Fbutton><\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:inline-flex;align-items:center;gap:8px;background:#15412f;color:#fff;font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:30px\">\n      <span style=\"width:8px;height:8px;border-radius:50%;background:#c2a04e;animation:gwpulse 1.6s infinite\"><\u002Fspan>{{ introChip }}\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;border-top:1px solid #e6e9e3;padding-top:18px\">\n      <div style=\"font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#6c766f;font-weight:600;margin-bottom:12px\">{{ introListTitle }}<\u002Fdiv>\n      <sc-for list=\"{{ featList }}\" as=\"f\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;align-items:center;gap:10px;font-size:13px;padding:5px 0;color:#15211b\">\n          <span style=\"width:18px;height:18px;border-radius:50%;background:#15412f;display:grid;place-items:center;flex:none\">\n            <svg viewBox=\"0 0 24 24\" width=\"11\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\"><path d=\"M5 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>{{ f }}\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PHONE -->\n  <div style=\"width:330px;height:710px;background:#0e0f0d;border-radius:50px;padding:11px;box-shadow:0 26px 60px -20px rgba(20,40,30,.34), 0 5px 16px -8px rgba(20,40,30,.2);flex:none;position:relative\">\n    <div style=\"position:absolute;top:10px;left:50%;transform:translateX(-50%);width:92px;height:25px;background:#0e0f0d;border-radius:20px;z-index:60\"><\u002Fdiv>\n\n    <!-- LOCK SCREEN -->\n    <sc-if value=\"{{ locked }}\" hint-placeholder-val=\"{{ true }}\">\n      <div onclick=\"{{ unlock }}\" style=\"position:absolute;inset:11px;border-radius:39px;z-index:50;cursor:pointer;background:linear-gradient(165deg,#15412f,#0d2a1e);display:flex;flex-direction:column;align-items:center;color:#fff;padding-top:90px\">\n        <div style=\"font-family:'Instrument Serif',serif;font-size:74px;line-height:1\">9:41<\u002Fdiv>\n        <div style=\"font-size:13px;color:#bcd2c5;margin-top:2px;letter-spacing:.02em\">Wednesday, 25 June<\u002Fdiv>\n        <div style=\"position:absolute;left:18px;right:18px;bottom:120px;background:rgba(255,255,255,.14);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:14px;display:flex;gap:11px;animation:gwslideup .6s .3s both\">\n          <div style=\"width:34px;height:34px;border-radius:9px;background:#c2a04e;display:grid;place-items:center;flex:none\"><svg viewBox=\"0 0 24 24\" width=\"18\" fill=\"none\" stroke=\"#2a230d\" stroke-width=\"2\"><path d=\"{{ lockNote.icon }}\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"font-size:12px;line-height:1.4\">\n            <div style=\"font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:#bcd2c5;margin-bottom:3px;display:flex;justify-content:space-between\"><span>Greenwood<\u002Fspan><span>now<\u002Fspan><\u002Fdiv>\n            <b style=\"display:block\">{{ lockNote.title }}<\u002Fb>{{ lockNote.sub }}\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:30px;font-size:12px;color:#9fc0ad;font-weight:600\">Tap to open ↑<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"width:100%;height:100%;background:#f6f7f3;border-radius:39px;overflow:hidden;position:relative;display:flex;flex-direction:column\">\n      <!-- status bar -->\n      <div style=\"display:flex;justify-co  #e6e9e3;border-radius:16px;padding:13px;text-align:center\"><div style=\"font-family:'Instrument Serif',serif;font-size:26px;line-height:1;color:#15412f\">{{ report.overall }}<span style=\"font-size:14px\">%<\u002Fspan><\u002Fdiv><small style=\"font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#6c766f;font-weight:600\">Overall<\u002Fsmall><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1px solid #e6e9e3;border-radius:16px;padding:13px;text-align:center\"><div style=\"font-family:'Instrument Serif',serif;font-size:26px;line-height:1;color:#15412f\">{{ report.rankLabel }}<\u002Fdiv><small style=\"font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#6c766f;font-weight:600\">Class rank<\u002Fsmall><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1px solid #e6e9e3;border-radius:16px;padding:13px;text-align:center\"><div style=\"font-family:'Instrument Serif',serif;font-size:26px;line-height:1;color:#15412f\">{{ report.grade }}<\u002Fdiv><small style=\"font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#6c766f;font-weight:600\">Grade<\u002Fsmall><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #e6e9e3;border-radius:20px;padding:15px;margin-bottom:12px;box-shadow:0 1px 2px rgba(20,40,30,.04)\">\n                <sc-for list=\"{{ report.subjects }}\" as=\"s\" hint-placeholder-count=\"4\">\n                  <div style=\"margin-bottom:13px\">\n                    <div style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:6px\"><span>{{ s.name }}<\u002Fspan><span style=\"color:#6c766f\">{{ s.score }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"height:7px;border-radius:6px;background:#f1f5f1;overflow:hidden\"><i style=\"display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#15412f,#1d5740);width:{{ s.pct }}\"><\u002Fi><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #e6e9e3;border-radius:20px;padding:15px;box-shadow:0 1px 2px rgba(20,40,30,.04);display:flex;gap:9px;align-items:flex-start\">\n                <span style=\"font-size:10px;font-weight:700;color:#15412f;background:#e8efe9;padding:3px 8px;border-radius:7px;margin-top:1px\">TEACHER<\u002Fspan>\n                <p style=\"font-size:12.5px;color:#6c766f;line-height:1.5;margin:0\">{{ report.remark }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ reportUpcoming }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;padding:40px 20px;color:#6c766f\">\n                <div style=\"width:54px;height:54px;border-radius:50%;background:#f1f5f1;display:grid;place-items:center;margin:0 auto 14px\"><svg viewBox=\"0 0 24 24\" width=\"24\" fill=\"none\" stroke=\"#9fb3a5\" stroke-width=\"1.8\"><path d=\"M12 7v5l3 2\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n                <div style=\"font-size:13.5px;font-weight:600;color:#15211b;margin-bottom:4px\">{{ report.name }} not published yet<\u002Fdiv>\n                <p style=\"font-size:12px;line-height:1.5;margin:0 auto;max-width:210px\">Results will be released after {{ report.when }}. You'll get a notification when they're ready.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ RESULTS · TEACHER (marks sheet) ============ -->\n        <sc-if value=\"{{ resultsTeacher }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:16px 15px 22px\">\n            <div style=\"font-size:10px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:#6c766f;margin-bottom:8px\">Examination<\u002Fdiv>\n            <div class=\"gw-scroll\" style=\"display:flex;gap:8px;overflow-x:auto;m :1;color:#15412f\">{{ maxMarks }}<\u002Fdiv><small style=\"font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:#6c766f;font-weight:600\">Max<\u002Fsmall><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #e6e9e3;border-radius:20px;padding:6px 14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(20,40,30,.04)\">\n                  <sc-for list=\"{{ marksSheet }}\" as=\"r\" hint-placeholder-count=\"8\">\n                    <div style=\"display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #f0f2ee\">\n                      <span style=\"width:20px;font-size:11px;color:#6c766f;font-weight:600;flex:none\">{{ r.roll }}<\u002Fspan>\n                      <span style=\"flex:1;font-size:13px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.name }}<\u002Fspan>\n                      <sc-if value=\"{{ r.notAbsent }}\" hint-placeholder-val=\"{{ true }}\">\n                        <input type=\"number\" value=\"{{ r.value }}\" onchange=\"{{ r.onMark }}\" placeholder=\"—\" style=\"width:50px;text-align:center;padding:8px 4px;border:1.5px solid #e6e9e3;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;color:#15211b;background:#fff;box-sizing:border-box\">\n                        <span style=\"font-size:11px;color:#b7bfb6;flex:none;width:24px\">/{{ maxMarks }}<\u002Fspan>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ r.absent }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"font-size:11px;font-weight:700;color:#c0392b;width:78px;text-align:center\">ABSENT<\u002Fspan>\n                      <\u002Fsc-if>\n                      <button onclick=\"{{ r.onAbsent }}\" style=\"{{ r.absBtnStyle }}\">A<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-if value=\"{{ pubToastProvisional }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"background:#fbf3e2;border:1px solid #ecd8ab;border-radius:14px;padding:11px 14px;margin-bottom:11px;font-size:12px;color:#8a6d1f;font-weight:600;display:flex;align-items:center;gap:8px\"><svg viewBox=\"0 0 24 24\" width=\"15\" fill=\"none\" stroke=\"#a9761b\" stroke-width=\"2.6\"><path d=\"M6 8a6 6 0 1112 0c0 7 3 8 3 8H3s3-1 3-8M10 21a2 2 0 004 0\"><\u002Fpath><\u002Fsvg>Provisional results sent to {{ curClass.label }} parents<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ pubToastSaved }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"background:#eef5f0;border:1px solid #cfe3d6;border-radius:14px;padding:11px 14px;margin-bottom:11px;font-size:12px;color:#15412f;font-weight:600;display:flex;align-items:center;gap:8px\"><svg viewBox=\"0 0 24 24\" width=\"15\" fill=\"none\" stroke=\"#1f8a5b\" stroke-width=\"2.6\"><path d=\"M5 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>Changes saved · parents see the updated marks<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ isEditingFinal }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;gap:9px\">\n                    <button onclick=\"{{ cancelReopen }}\" style=\"flex:1;padding:14px;border-radius:14px;background:#fff;color:#15412f;font-weight:600;font-size:13.5px;border:1.5px solid #d3ddd4;cursor:pointer;font-family:inherit\">Cancel<\u002Fbutton>\n                    <button onclick=\"{{ republishMarks }}\" style=\"flex:1;padding:14px;border-radius:14px;background:#15412f;color:#fff;font-weight:600;font-size:13.5px;border:none;cursor:pointer;font-family:inherit\">Save &amp; re-publish<\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"text-align:center;font-size:11px;color:#6c766f;margin-top:9px;line-height:1.4\">Re-publishing pushes the corrected report cards to parents and notes the update.<\u002Fdiv>\n                <\u002Fs
